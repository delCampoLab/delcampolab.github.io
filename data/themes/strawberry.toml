# Pantone Living Coral (#FF6F61) override for the strawberry theme.
# All colour slots are filled to avoid <no value> in the HugoBlox SCSS template.
# Variable names map directly to $sta-* SCSS vars (e.g. menu_title → $sta-menu-title).

[light]
  primary           = "#FF6F61"
  menu_primary      = "#FF6F61"
  menu_title        = "#fff"
  menu_text         = "#fff"
  menu_text_active  = "#fff"
  menu_active       = "#fff"
  link              = "#FF6F61"
  link_hover        = "#e05045"
  header            = "#FF6F61"
  active            = "#FF6F61"
  background        = "#fff"
  home_section_odd  = "#fff"
  home_section_even = "#f7f7f7"

[dark]
  primary           = "#FF6F61"
  menu_primary      = "#FF6F61"
  menu_title        = "#fff"
  menu_text         = "#fff"
  menu_text_active  = "#fff"
  menu_active       = "#fff"
  link              = "#FF6F61"
  link_hover        = "#e05045"
  header            = "#FF6F61"
  active            = "#FF6F61"
  background        = "#1d1f27"
  home_section_odd  = "#1d1f27"
  home_section_even = "#23252f"
